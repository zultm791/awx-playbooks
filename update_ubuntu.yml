---
- name: Update, Upgrade, and Force Reboot
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Remove unused dependency packages
      ansible.builtin.apt:
        autoremove: yes

    - name: Clean up local repository
      ansible.builtin.apt:
        autoclean: yes

    - name: Reboot the server immediately
      ansible.builtin.reboot:
        msg: "System update complete. Forced reboot by Ansible."
        reboot_timeout: 600  # Waits up to 10 minutes for the server to come back
