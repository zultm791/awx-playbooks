---
- name: Update Red Hat Enterprise Linux
  hosts: all
  become: yes
  tasks:
    - name: Upgrade all packages via DNF
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: yes
      register: dnf_update

    - name: Check if a reboot is required
      ansible.builtin.shell: /usr/bin/needs-restarting -r
      register: reboot_required
      ignore_errors: yes
      failed_when: false
      changed_when: false

    - name: Reboot the server if kernel was updated
      ansible.builtin.reboot:
        msg: "Rebooting to apply kernel updates"
        reboot_timeout: 600
      when: reboot_required.rc != 0
