---
- name: Install IIS on Windows servers
  hosts: all
  gather_facts: yes

  tasks:
    - name: Install IIS Web-Server
      win_feature:
        name: Web-Server
        state: present
        include_sub_features: yes
        include_management_tools: yes

    - name: Ensure IIS service is running
      win_service:
        name: W3SVC
        start_mode: auto
        state: started
